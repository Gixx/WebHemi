name: PHPStan

on:
    workflow_run:
        workflows: ["CI"]
        types: [completed]

jobs:
    badge:
        name: PHPStan Badge Status
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master' }}

        steps:
            - name: Mirror PHPStan job result
              uses: actions/github-script@v8
              with:
                  script: |
                      const { owner, repo } = context.repo;
                      const runId = context.payload.workflow_run.id;
                      const exactNames = [
                        'QA / PHPStan',
                        'QA / PHP Stan'
                      ];

                      const jobs = await github.paginate(
                        github.rest.actions.listJobsForWorkflowRun,
                        { owner, repo, run_id: runId, per_page: 100 }
                      );

                      const targetJob = jobs.find((job) => {
                        if (exactNames.includes(job.name)) {
                          return true;
                        }

                        const lowerName = job.name.toLowerCase();
                        return (
                          job.name.startsWith('QA /')
                          && (lowerName.includes('phpstan') || lowerName.includes('php stan'))
                        );
                      });
                      if (!targetJob) {
                        const availableNames = jobs.map((job) => job.name).join(', ');
                        core.setFailed(`Job not found in CI run (PHPStan). Available jobs: ${availableNames}`);
                        return;
                      }

                      if (targetJob.conclusion !== 'success') {
                        core.setFailed(`CI job failed: ${targetJob.name} (${targetJob.conclusion})`);
                      }
