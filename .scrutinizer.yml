filter:
    paths: ['src/*']
    excluded_paths: ['vendor/*', 'tests/*', 'bin/*', 'build/*', 'config/*', 'data/*', 'resources/*']

checks:
    php:
        code_rating: true
        duplication: true
        remove_extra_empty_lines: true
        remove_php_closing_tag: true
        remove_trailing_whitespace: true
        fix_use_statements:
            remove_unused: true
            preserve_multiple: false
            preserve_blanklines: true
            order_alphabetically: true
        fix_php_opening_tag: true
        fix_linefeed: true
        fix_line_ending: true
        fix_identation_4spaces: true
        fix_doc_comments: true
        no_debug_code: true

coding_style:
    php:
        spaces:
            around_operators:
                bitwise: false

before_commands:
    - 'composer install --no-interaction --prefer-dist'

build:
    image: default-bionic
    nodes:
        analysis:
            environment:
                php: '8.4'

            before:
                - sudo apt-get update
                - sudo apt-get install -y build-essential zlib1g-dev
                - wget https://www.openssl.org/source/openssl-1.1.1w.tar.gz
                - tar -zxf openssl-1.1.1w.tar.gz
                - |
                    cd openssl-1.1.1w
                    ./config --prefix=/usr/local/openssl --openssldir=/usr/local/openssl
                    make
                    sudo make install
                override:
                    # Itt exportáljuk az útvonalat, hogy a pkg-config megtalálja
                    - export PKG_CONFIG_PATH=/usr/local/openssl/lib/pkgconfig:$PKG_CONFIG_PATH
                    - 'php-scrutinizer-run --enable-security-analysis'
                    - 'vendor/bin/phpunit -c phpunit.xml --coverage-clover build/logs/clover.xml'

tools:
    external_code_coverage: false

    sensiolabs_security_checker: true

    php_changetracking: true

    php_code_coverage:
        enabled: true

    php_code_sniffer:
        enabled: true
        config:
            standard: PSR12
        filter:
            paths: ["src/*"]

    php_cpd:
        enabled: true
        excluded_dirs: ["vendor", "tests", "bin", "build", "resources", "config", "data"]

    php_analyzer:
        enabled: true
        filter:
            paths: ["src/*"]

    php_mess_detector:
        enabled: true
        filter:
            paths: ["src/*"]
        config:
            ruleset: "phpmd.xml"

    php_pdepend:
        enabled: true
        excluded_dirs: ["build", "tests", "vendor"]

    php_loc:
        enabled: true
        excluded_dirs: ["vendor", "tests", "bin", "build", "resources", "config", "data"]
