deptrac:
    paths:
        - ./src
    exclude_files:
        - '#.*test.*#'
    layers:
        -
            name: Controller
            collectors:
                -
                    type: directory
                    value: src/Admin/Controller
                -
                    type: directory
                    value: src/Site/Controller
        -
            name: Repository
            collectors:
                -
                    type: directory
                    value: src/Repository
        -
            name: Service
            collectors:
                -
                    type: classLike
                    value: '^App\\.*Service.*$'
    ruleset:
        Controller:
            - Service
            - Repository
        Service:
            - Repository
        Repository:
            - Service
